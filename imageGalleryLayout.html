<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 3: Image Gallery with Hover Zoom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

    
        .gallery-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .gallery-header h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .gallery-header p {
            color: #666;
            font-size: 1.1rem;
        }

      
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

      
        .gallery-item {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .image-wrapper {
            overflow: hidden;
            aspect-ratio: 4 / 3;
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: block;
        }

       
        .gallery-item:hover .gallery-img {
            transform: scale(1.1);
        }

        .image-caption {
            padding: 1rem;
            text-align: center;
            background: white;
        }

        .image-caption h3 {
            font-size: 1rem;
            color: #333;
        }

        /* Responsive: Tablet */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .gallery-header h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gallery-header">
            <h1>Image Gallery</h1>
            <p>3 images per row | Hover to zoom</p>
        </div>

        <div class="gallery-grid">
           
            <div class="gallery-item">
                <div class="image-wrapper">
                    <img class="gallery-img" src="https://picsum.photos/id/1015/400/300" alt="Mountain Landscape">
                </div>
                <div class="image-caption">
                    <h3>Mountain Peak</h3>
                </div>
            </div>

            
            <div class="gallery-item">
                <div class="image-wrapper">
                    <img class="gallery-img" src="https://picsum.photos/id/104/400/300" alt="Lake Reflection">
                </div>
                <div class="image-caption">
                    <h3>Crystal Lake</h3>
                </div>
            </div>

        
            <div class="gallery-item">
                <div class="image-wrapper">
                    <img class="gallery-img" src="https://picsum.photos/id/169/400/300" alt="Sunset Beach">
                </div>
                <div class="image-caption">
                    <h3>Golden Sunset</h3>
                </div>
            </div>

     
            <div class="gallery-item">
                <div class="image-wrapper">
                    <img class="gallery-img" src="https://picsum.photos/id/155/400/300" alt="City Architecture">
                </div>
                <div class="image-caption">
                    <h3>Urban City</h3>
                </div>
            </div>

         
            <div class="gallery-item">
                <div class="image-wrapper">
                    <img class="gallery-img" src="https://picsum.photos/id/20/400/300" alt="Coffee and Laptop">
                </div>
                <div class="image-caption">
                    <h3>Cozy Workspace</h3>
                </div>
            </div>

            <div class="gallery-item">
                <div class="image-wrapper">
                    <img class="gallery-img" src="https://picsum.photos/id/29/400/300" alt="Forest Path">
                </div>
                <div class="image-caption">
                    <h3>Forest Trail</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
