<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 2: Product Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

      
        .product-card {
            max-width: 350px;
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

      
        .product-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .product-category {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-description {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .price span {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
        }

        .add-to-cart {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .add-to-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .add-to-cart:active {
            transform: translateY(0);
        }


        @media (max-width: 480px) {
            .product-card {
                max-width: 100%;
                margin: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="product-card">
        <div class="product-image">
            <img src="https://picsum.photos/id/20/400/300" alt="Premium Headphones">
        </div>
        <div class="product-info">
            <h2 class="product-name">Wireless Studio Headphones</h2>
            <p class="product-category">Electronics • Audio</p>
            <p class="product-description">Experience crystal clear sound with noise cancellation technology. Comfortable design for all-day listening.</p>
            <div class="price">$199.99 <span>USD</span></div>
            <button class="add-to-cart">Add to Cart →</button>
        </div>
    </div>
</body>
</html>
