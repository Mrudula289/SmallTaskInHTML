<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pricing Table</title>
    <style>
        .main{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 100px;
        }
        .box1, .box2, .box3{
            text-align: center;
            width: 300px;
            height: 300px;
            border-radius: 10px;
            border: 3px solid black;
           
        }
        .box1:hover, .box2:hover, .box3:hover{
            box-shadow: 5px 2px 20px 3px goldenrod;
       
        }
        .main p{
            color: brown;
            font-size: 20px;
            font-weight: bold;
        }
        .main h1{
            color: goldenrod;
        }
        .main ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }
        button{
            padding: 10px 20px;
            background-color: goldenrod;
            color: black;
            width: 80%;
            border-radius: 20px;
            margin-top: 30px;
           font-size: 16px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box1">
            <h1>Basic</h1>
            <p>$9.99/month</p>
            <ul>
                <li>10GB Storage</li>
                <li>100GB Bandwidth</li>
                <li>24/7 Support</li>
            </ul>
            <button>Get Started</button>
        </div>
        <div class="box2">
            <h1>Standard</h1>
            <p>$19.99/month</p> 
            <ul>
                <li>50GB Storage</li>
                <li>500GB Bandwidth</li>
                <li>24/7 Support</li>
            </ul>
            <button>Get Started</button>
        </div>
        <div class="box3">
            <h1>Premium</h1>
            <p>$29.99/month</p>
            <ul>
                <li>100GB Storage</li>
                <li>Unlimited Bandwidth</li>
                <li>24/7 Support</li>
            </ul>
            <button>Get Started</button>
        </div>
    </div>

</body>
</html>
