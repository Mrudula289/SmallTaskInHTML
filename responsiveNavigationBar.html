<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navgation Bar</title>
    <style>
             *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
    height: 80px;
}

.logo img{
    width:120px;
}
.mainMenu{
    display:flex;
    justify-content:center;
    margin-left: 200px;
}
.menu{
    list-style:none;
    display:flex;
    gap:35px;
}

.menu a{
    text-decoration:none;
    color:#333;
    font-size:16px;
}

.menu a:hover{
    color:palevioletred;
    border-bottom: 2px solid palevioletred;
}
li a.btn{
    color: palevioletred
    
}
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                height: auto;
                padding: 15px 20px;
                gap: 20px;
            }
            
            .mainMenu {
                margin-left: 0;
                width: 100%;
            }
            
            .menu {
                flex-direction: column;
                align-items: center;
                gap: 15px;
                width: 100%;
            }
            
            .menu li {
                width: 100%;
                text-align: center;
            }
            
            .menu a {
                display: block;
                padding: 8px 0;
            }
        }

    </style>
</head>
<body>
     <div class="navbar">
        <div class="logo">
            <img src="./assets/images.png" alt="logo" height="100px">
        </div>
        <div class="mainMenu">
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="AboutUs.html">About Us</a></li>
            <li><a href="Products.html">Products</a></li>
            <li><a href="ContactUs.html">Contact Us</a></li>
            <li><a href="#" class="btn">ORDER NOW</a></li>
        </ul>
        </div>
    </div>
</body>
</html>
